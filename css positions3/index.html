<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS positions Assignment2</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="seeall-container">
        <p>See All</p>
      </div>
      <div class="main-container">
        <h1>Explore Art Work</h1>
        <div class="grid-container">
          <div class="card">
            <img src="./resources/monocular.png" alt="" />
            <div class="like-container">
              <p>Monocular</p>
              <div class="like-display">
                <p>54.8k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/hornsmask.png" alt="" />
            <div class="like-container">
              <p>Horns Mask</p>
              <div class="like-display">
                <p>32.4k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/lightmoon.png" alt="" />
            <div class="like-container">
              <p>Light Moon</p>
              <div class="like-display">
                <p>88.8k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/skullwire.png" alt="" />
            <div class="like-container">
              <p>Skull Wire</p>
              <div class="like-display">
                <p>78.9k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/spiderman.png" alt="" />
            <div class="like-container">
              <p>Spiderman</p>
              <div class="like-display">
                <p>24.8k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/deadpool.png" alt="" />
            <div class="like-container">
              <p>Deadpool</p>
              <div class="like-display">
                <p>59.7k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/whiteeye.png" alt="" />
            <div class="like-container">
              <p>White Eye</p>
              <div class="like-display">
                <p>45.7k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
          <div class="card">
            <img src="./resources/plasticspinal.png" alt="" />
            <div class="like-container">
              <p>Plastic Spinal</p>
              <div class="like-display">
                <p>95.6k</p>
                <i class="ri-heart-line"></i>
              </div>
            </div>
            <button>Place Bid</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
