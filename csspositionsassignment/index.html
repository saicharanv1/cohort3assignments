<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Positions | Pikachu</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav>
      <div class="navbar">
        <img
          src="./resources/pokemonlogo.png"
          alt="pokemon logo"
          class="pokemon-logo"
        />
        <img
          src="./resources/hamburgericon.png"
          alt="hamburger menu image"
          class="hamburger-icon"
        />
      </div>
    </nav>
    <main>
      <div class="main-container">
        <div class="text-container">
          <h3>POKEMON GEN I</h3>
          <h1>Pikachu</h1>
          <p>
            Pikachu is an Electric-type Pokemon introduced in Generation I.
            Pikachu are small, chubby, and incredibly cure mouse-like Pokemon.
            They are almost completely covered by yellow fur.
          </p>
          <div class="page-number">
            <div class="dash-line"></div>
            <b>01 / 08</b>
          </div>
        </div>
        <img
          src="./resources/pikachunobg.png"
          alt="pikachu image"
          class="pikachu-image"
        />
        <div class="page-dots">
          <div class="black-dot"></div>
          <div class="yellow-dot"></div>
          <div class="yellow-dot"></div>
          <div class="yellow-dot"></div>
          <div class="yellow-dot"></div>
        </div>
      </div>
      <img
        src="./resources/pokemonball.png"
        alt="pokemon ball"
        class="pokemon-ball"
      />
    </main>
  </body>
</html>
